services:
  backend:
    build: ./backend/
    container_name: backend-container
    env_file:
      - ./backend/env/.env.production
    # volumes:
    #   - ./backend/:/projects/coffee/backend/
    #   - /projects/coffee/backend/node_modules
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/v1/health"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - coffee-network

  admin:
    build: ./frontend-admin/
    container_name: admin-container
    env_file:
      - ./frontend-admin/.env.production
    # volumes:
    #   - ./frontend-admin/:/projects/coffee/frontend-admin/
    #   - /projects/coffee/frontend-admin/node_modules
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/admin/login"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - coffee-network

  main:
    build: ./frontend-coffee/
    container_name: main-fe-container
    env_file:
      - ./frontend-coffee/.env.production
    # volumes:
    #   - ./frontend-coffee/:/projects/coffee/frontend-coffee/
    #   - /projects/coffee/frontend-coffee/node_modules
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - coffee-network

  nginx:
    depends_on:
      - backend
      - admin
      - main

    image: nginx:latest
    container_name: nginx-container
    ports:
      - 80:80
    # volumes:
    #   - ./nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - coffee-network

networks:
  coffee-network:
    driver: bridge
