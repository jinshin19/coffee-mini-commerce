# ======== NGINX VARIABLES
# $scheme          # http / https
# $host            # domain (localhost, example.com)
# $request_method  # GET POST PUT DELETE
# $request_uri     # full path + query
# $uri             # path only
# $args            # query string
# $is_args         # "?" if query exists
# $http_authorization  # Authorization header
# $remote_addr     # client IP
# ===========================
# proxy_cache_path → where to store
# proxy_cache → enable cache
# proxy_cache_valid → how long
# proxy_cache_key → uniqueness
# proxy_cache_bypass → when NOT to cache
# $upstream_cache_status → debug
# ===== Special feature of nginx caching
# proxy_cache_use_stale error timeout updating;

proxy_cache_path /var/cache/nginx keys_zone=cache1:10m max_size=1g inactive=60m;